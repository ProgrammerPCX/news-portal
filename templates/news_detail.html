<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>{{ item.title }}</title>

    <style>
        body {
            font-family: sans-serif;
            background: #f8fafc;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        a {
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/">← Indietro</a>

    <h1>{{ item.title }}</h1>

    <p><b>{{ item.category }}</b></p>

    <p>{{ item.summary }}</p>

    <hr>

    <p>{{ item.content }}</p>

</div>

</body>
</html>
